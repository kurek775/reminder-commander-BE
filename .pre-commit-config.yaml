repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.6
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.14.0
    hooks:
      - id: mypy
        additional_dependencies:
          - fastapi==0.115.6
          - pydantic-settings==2.7.0
          - sqlalchemy==2.0.36
          - celery==5.4.0
          - redis==5.2.1
          - httpx==0.28.1
        args: [--ignore-missing-imports]
